name: Gerar Downloads Separados

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Criar Pacotes
        run: |
          # Criando os arquivos individuais
          zip -r Comportamento.mcpack BP
          zip -r Texturas.mcpack RP
          zip -r Addon_Completo.mcaddon BP RP

      - name: Upload Behavior Pack
        uses: actions/upload-artifact@v4
        with:
          name: Download_BP_Separado
          path: Comportamento.mcpack

      - name: Upload Resource Pack
        uses: actions/upload-artifact@v4
        with:
          name: Download_RP_Separado
          path: Texturas.mcpack

      - name: Upload Addon Completo
        uses: actions/upload-artifact@v4
        with:
          name: Download_Addon_Completo
          path: Addon_Completo.mcaddon
